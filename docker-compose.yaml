services:
  # Edge HTTP proxy — single public ingress. zrok tunnel points here
  # (port 8080 on host) instead of bff-service. Routes /webhooks/*
  # straight to notify-service so BFF never sees webhook traffic;
  # everything else falls through to bff-service.
  edge:
    container_name: edge
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 64m
    mem_reservation: 32m
    cpus: "0.1"
    ports:
      # Edge takes host port 3001. BFF used to bind 3001 directly; now
      # edge fronts it so zrok (which forwards to 127.0.0.1:3001) lands
      # in Caddy first and webhooks bypass BFF.
      - "127.0.0.1:${EDGE_PORT:-3001}:80"
    volumes:
      # Mount the directory, not the single Caddyfile — file bind-mounts
      # in Docker Desktop / WSL break when the file is replaced atomically
      # (editor rename → new inode), forcing a container recreate. Mounting
      # the parent dir is robust to file rewrites and lets `caddy reload`
      # pick up changes live.
      - ./infra/caddy:/etc/caddy:ro
    depends_on:
      bff-service:
        condition: service_started
      notify-service:
        condition: service_started
    networks:
      - backend-net

  # Serwis konfiguracyjny cały systme główny, odpowiedzialny za logikę biznesową, komunikację z bazą danych i innymi serwisami poprzez gRPC oraz udostępnianie API dla frontendu
  bff-service:
    # profiles:
    #   - front
    container_name: bff-service
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npx ts-node-dev -r tsconfig-paths/register --respawn --transpile-only
      --exit-child src/bff-service/main.ts
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.5"
    volumes:
      - .:/app
      - /app/node_modules
    # No host port mapping — bff is reached via edge (Caddy) only. Other
    # services talk to it over backend-net at bff-service:3001 (HTTP)
    # and bff-service:50054 (gRPC, BffNotifyBridge).
    expose:
      - "3001"
      - "50054"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      BFF_PORT: "${BFF_PORT}"
      BFF_GRPC_URL: "${BFF_GRPC_URL}"
      NOTIFY_GRPC_URL: "${NOTIFY_GRPC_URL}"
      TS_NODE_PROJECT: /app/tsconfig.json
      NODE_OPTIONS: "--max-old-space-size=2048"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-service:
        condition: service_started
      # notify-service:
      #   condition: service_started
      #   required: false
    networks:
      - backend-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:${BFF_PORT:-3001}/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # front-service:
  #   container_name: front-service
  #   build:
  #     context: ./src/front-service
  #     dockerfile: Dockerfile.dev
  #   restart: unless-stopped
  #   # Next.js 15 + Turbopack on a multi-locale wizard climbs past 1G the
  #   # first time each route is compiled. At a 1G limit the container hits
  #   # 99.8 % and hangs (process stays alive but stops accepting connections,
  #   # so zrok shows BadGateway). 2G leaves headroom for dev mode; a prod
  #   # build (next build → next start) fits well below.
  #   mem_limit: 2048m
  #   mem_reservation: 1024m
  #   cpus: "0.5"
  #   volumes:
  #     - ./src/front-service:/app
  #     - /app/node_modules
  #     - /app/.next
  #   ports:
  #     - "127.0.0.1:4002:4002"
  #   environment:
  #     CHOKIDAR_USEPOLLING: "true"
  #     WATCHPACK_POLLING: "true"
  #     API_INTERNAL_URL: "http://bff-service:${BFF_PORT:-3001}"
  #     NEXT_PUBLIC_API_HOST_URL: "${NEXT_PUBLIC_API_HOST_URL:-http://localhost:${BFF_PORT:-3001}}"
  #     NEXT_DEV_ALLOWED_ORIGINS: "${NEXT_DEV_ALLOWED_ORIGINS:-}"
  #   depends_on:
  #     bff-service:
  #       condition: service_started
  #   networks:
  #     - backend-net

  # Serwis główny, odpowiedzialny za logikę biznesową, komunikację z bazą danych i innymi serwisami poprzez gRPC oraz udostępnianie API dla frontendu
  core-service:
    container_name: core-service
    # profiles:
    #   - gate
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.5"

    # Komenda wymuszająca start konkretnego pliku i obserwowanie zmian
    command: npx ts-node-dev -r tsconfig-paths/register --respawn --transpile-only
      src/core-service/main.ts
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "50053:50053"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      DB_GRPC_URL: "${DB_GRPC_URL}"
      NOTIFY_GRPC_URL: "${NOTIFY_GRPC_URL}"
      GRPC_PORT: "${GRPC_PORT}"
      TS_NODE_PROJECT: /app/tsconfig.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-service:
        condition: service_started
      notify-service:
        condition: service_started
    networks:
      - backend-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:${GATE_PORT:-3002}/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Database service - serwis odpowiedzialny za komunikację z bazą danych i udostępnianie danych innym serwisom poprzez gRPC
  db-service:
    # profiles:
    #   - gate
    #   - front
    container_name: db-service
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.25"
    ports:
      - "${GRPC_PORT}:50051"
    command: npx ts-node-dev -r tsconfig-paths/register --respawn --transpile-only
      src/db-service/main.ts
    # Startuje drugi punkt wejścia w tym samym projekcie
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      DB_GRPC_URL: "${DB_GRPC_URL}"
      PROTO_PATH: /app/src/proto/user.proto
      TS_NODE_PROJECT: /app/tsconfig.json
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy

  # Serwis powiadamiajacy
  notify-service:
    # profiles:
    #   - gate
    #   - notify
    container_name: notify-service
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npx ts-node-dev -r tsconfig-paths/register --respawn --transpile-only
      src/notify-service/main.ts
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.25"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${NOTIFY_PORT}:50052"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      NOTIFY_PORT: "${NOTIFY_PORT}"
      TS_NODE_PROJECT: /app/tsconfig.json
      GATE_GRPC_URL: "${GATE_GRPC_URL}"
      BFF_GRPC_URL: "${BFF_GRPC_URL}"
      SIGNAL_API_URL: "http://signal_bridge:8080"
      TWILO_SID: "${TWILO_SID}"
      TWILO_TOKEN: "${TWILO_TOKEN}"
      TWILO_PHONE: "${TWILO_PHONE}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM: "${SMTP_FROM}"
    depends_on:
      signal-api:
        condition: service_started
        required: false
    networks:
      - backend-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:${NOTIFY_PORT:-3003}/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
      # Database

  postgres:
    # profiles:
    #   - gate
    #   - front
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.5"
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${DATABASE_USER}"
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD}"
      POSTGRES_DB: "${DATABASE_DB}"
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache i kolejki Redis
  redis:
    # profiles:
    #   - gate
    #   - front
    image: redis/redis-stack-server:latest
    container_name: redis_cache
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.25"
    # Use environment variables for the password instead of overriding the command
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
      - "8001:8001" # Optional: Redis Insight GUI to verify JSON data
    networks:
      - backend-net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Most do komunikacji Signal
  signal-api:
    image: bbernhard/signal-cli-rest-api
    container_name: signal_bridge
    restart: unless-stopped
    mem_limit: 5126m
    mem_reservation: 256m
    cpus: "0.5"
    environment:
      - MODE=json-rpc
    volumes:
      - ./signal-data:/home/.local/share/signal-cli
    ports:
      - "8081:8080"
    networks:
      - backend-net
    # Add a manual healthcheck if the image doesn't define one correctly
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/v1/about || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  # languagetool:
  #   image: erikvl82/languagetool:latest
  #   container_name: local_languagetool
  #   environment:
  #     - Java_Xms=256m
  #     - Java_Xmx=512m
  #   ports:
  #     - "8010:8010"
  #   restart: always
  #   networks:
  #     - backend-net

volumes:
  postgres_data:
  redis_data:

networks:
  backend-net:
    driver: bridge

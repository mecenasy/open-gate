version: "3.8"

services:
  api:
    container_name: api
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped

    # Komenda wymuszająca start konkretnego pliku i obserwowanie zmian
    command: npx ts-node-dev -r tsconfig-paths/register --respawn --transpile-only src/gate-service/main.ts
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3002:3002"
      - "50053:50053"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      USER_SERVICE_URL: "${GRPC_SERVICE_URL}"
      NOTIFY_SERVICE_GRPC_URL: "notify-service:50052"
      SIGNAL_GRPC_PORT: 50053
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      grpc-service:
        condition: service_started
      notify-service:
        condition: service_started
    networks:
      - backend-net

  grpc-service:
    container_name: grpc-service
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${GRPC_PORT}:50051"
    command: npx ts-node-dev -r tsconfig-paths/register --respawn --transpile-only src/grpc-service/main.ts
    restart: unless-stopped
    # Startuje drugi punkt wejścia w tym samym projekcie
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      GRPC_URL: "${GRPC_URL}"
      PROTO_PATH: /app/src/proto/user.proto
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy

  notify-service:
    container_name: notify-service
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npx ts-node-dev -r tsconfig-paths/register --respawn --transpile-only src/notify-service/main.ts
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3003:3003"
      - "50052:50052"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      PORT: 3003
      GRPC_PORT: 50052
      GATE_SERVICE_GRPC_URL: "api:50053"
      SIGNAL_API_URL: "http://signal_bridge:8080"
    depends_on:
      signal-api:
        condition: service_started
    networks:
      - backend-net

  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${DATABASE_USER}"
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD}"
      POSTGRES_DB: "${DATABASE_DB}"
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache i kolejki Redis
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Most do komunikacji Signal
  signal-api:
    image: bbernhard/signal-cli-rest-api
    container_name: signal_bridge
    restart: unless-stopped
    environment:
      - MODE=json-rpc
    volumes:
      - ./signal-data:/home/.local/share/signal-cli
    ports:
      - "8081:8080"
    networks:
      - backend-net

volumes:
  postgres_data:
  redis_data:

networks:
  backend-net:
    driver: bridge

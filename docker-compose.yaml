services:
  # Serwis konfiguracyjny cały systme główny, odpowiedzialny za logikę biznesową, komunikację z bazą danych i innymi serwisami poprzez gRPC oraz udostępnianie API dla frontendu
  bff-service:
    # profiles:
    #   - front
    container_name: bff-service
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npx ts-node-dev -r tsconfig-paths/register --respawn --transpile-only --exit-child src/bff-service/main.ts
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: '0.5'
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      BFF_PORT: "${BFF_PORT}"
      NOTIFY_GRPC_URL: "${NOTIFY_GRPC_URL}"
      TS_NODE_PROJECT: /app/tsconfig.json
      NODE_OPTIONS: "--max-old-space-size=2048"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # notify-service:
      #   condition: service_started
      #   required: false
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${BFF_PORT:-3001}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # front-service:
  #   container_name: front-service
  #   build:
  #     context: ./src/front-service
  #     dockerfile: Dockerfile.dev
  #   restart: unless-stopped
  #   volumes:
  #     - ./src/front-service:/app
  #     - /app/node_modules
  #     - /app/.next
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     WATCHPACK_POLLING: true
  #     NEXT_PUBLIC_BFF_URL: "http://bff-service:3001"
  #   depends_on:
  #     - bff-service
  #   networks:
  #     - backend-net

  # Serwis główny, odpowiedzialny za logikę biznesową, komunikację z bazą danych i innymi serwisami poprzez gRPC oraz udostępnianie API dla frontendu
  core-service:
    container_name: core-service
    # profiles:
    #   - gate
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: '0.5'

    # Komenda wymuszająca start konkretnego pliku i obserwowanie zmian
    command: npx ts-node-dev -r tsconfig-paths/register --respawn --transpile-only src/core-service/main.ts
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "50053:50053"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      DB_GRPC_URL: "${DB_GRPC_URL}"
      NOTIFY_GRPC_URL: "${NOTIFY_GRPC_URL}"
      GRPC_PORT: "${GRPC_PORT}"
      TS_NODE_PROJECT: /app/tsconfig.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-service:
        condition: service_started
      notify-service:
        condition: service_started
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${GATE_PORT:-3002}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

    # Database service - serwis odpowiedzialny za komunikację z bazą danych i udostępnianie danych innym serwisom poprzez gRPC
  db-service:
    # profiles:
    #   - gate
    #   - front
    container_name: db-service
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    cpus: '0.25'
    ports:
      - "${GRPC_PORT}:50051"
    command: npx ts-node-dev -r tsconfig-paths/register --respawn --transpile-only src/db-service/main.ts
    # Startuje drugi punkt wejścia w tym samym projekcie
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      DB_GRPC_URL: "${DB_GRPC_URL}"
      PROTO_PATH: /app/src/proto/user.proto
      TS_NODE_PROJECT: /app/tsconfig.json
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy

  # Serwis powiadamiajacy
  notify-service:
    # profiles:
    #   - gate
    #   - notify
    container_name: notify-service
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npx ts-node-dev -r tsconfig-paths/register --respawn --transpile-only src/notify-service/main.ts
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    cpus: '0.25'
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${NOTIFY_PORT}:50052"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      NOTIFY_PORT: "${NOTIFY_PORT}"
      TS_NODE_PROJECT: /app/tsconfig.json
      GATE_GRPC_URL: "${GATE_GRPC_URL}"
      SIGNAL_API_URL: "http://signal_bridge:8080"
      TWILO_SID: "${TWILO_SID}"
      TWILO_TOKEN: "${TWILO_TOKEN}"
      TWILO_PHONE: "${TWILO_PHONE}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM: "${SMTP_FROM}"
    depends_on:
      signal-api:
        condition: service_healthy
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${NOTIFY_PORT:-3003}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

      # Database

  postgres:
    # profiles:
    #   - gate
    #   - front
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: '0.5'
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${DATABASE_USER}"
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD}"
      POSTGRES_DB: "${DATABASE_DB}"
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache i kolejki Redis
  redis:
    # profiles:
    #   - gate
    #   - front
    image: redis/redis-stack-server:latest
    container_name: redis_cache
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    cpus: '0.25'
    # Use environment variables for the password instead of overriding the command
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
      - "8001:8001" # Optional: Redis Insight GUI to verify JSON data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Most do komunikacji Signal
  signal-api:
    image: bbernhard/signal-cli-rest-api
    container_name: signal_bridge
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    cpus: '0.25'
    environment:
      - MODE=json-rpc
    volumes:
      - ./signal-data:/home/.local/share/signal-cli
    ports:
      - "8081:8080"
    networks:
      - backend-net
    # Add a manual healthcheck if the image doesn't define one correctly
    healthcheck:
      test: ["CMD", "curl", "-a", "http://localhost:8080/v1/about"]
      timeout: 5s
      retries: 10
      start_period: 30s

  # languagetool:
  #   image: erikvl82/languagetool:latest
  #   container_name: local_languagetool
  #   environment:
  #     - Java_Xms=256m
  #     - Java_Xmx=512m
  #   ports:
  #     - "8010:8010"
  #   restart: always
  #   networks:
  #     - backend-net

volumes:
  postgres_data:
  redis_data:

networks:
  backend-net:
    driver: bridge

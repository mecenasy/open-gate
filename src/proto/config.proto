syntax = "proto3";

package config;

import "google/protobuf/empty.proto";
service ConfigService {
  rpc GetCoreAll (google.protobuf.Empty) returns (GetAllResponse);
  rpc GetFeatures (google.protobuf.Empty) returns (GetAllResponse);
  rpc GetFeatureConfig (GetConfigsRequest) returns (GetAllResponse);
  rpc UpdateConfig (UpdateConfigRequest) returns (ConfigResponse);
}

// Configuration entity
message Config {
  string id = 1;
  string key = 2;
  string value = 3;
  string description = 4;
  string created_at = 5;
  string updated_at = 6;
}

// Request to add a new config
message UpdateConfigRequest {
  string key = 1;
  string value = 2;
}

message GetConfigsRequest {
  string key = 1;
}

// Response containing multiple configs
message GetAllResponse {
  bool status = 1;
  string message = 2;
  repeated Config data = 3;
}
message ConfigResponse {
  bool status = 1;
  string message = 2;
  Config data = 3;
}

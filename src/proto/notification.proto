syntax = "proto3";

package notification;

service NotificationService {
  rpc SendSms (SendSmsRequest) returns (NotificationAck);
  rpc SendMailCode (SendMailCodeRequest) returns (NotificationAck);
  rpc SendResetToken (SendResetTokenRequest) returns (NotificationAck);
}

message SendSmsRequest {
  string phoneNumber = 1;
  int32 code = 2;
}

message SendMailCodeRequest {
  string email = 1;
  int32 code = 2;
}

message SendResetTokenRequest {
  string email = 1;
  string url = 2;
}

message NotificationAck {
  bool success = 1;
  string message = 2;
}

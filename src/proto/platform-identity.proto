syntax = "proto3";

package platformIdentity;

// Hosted by db-service (port 50051) — CRUD over shared_config.platform_identities.
// Source of truth for "who is this Signal UUID / WA jid / FB id?" lookups.
// Queried by signal-transformer on every incoming Signal message
// (UUID → phone resolution) so the existing core-service identity handler
// (lookup by phone) keeps working unchanged.
service PlatformIdentityDbService {
  rpc UpsertPlatformIdentity (UpsertPlatformIdentityRequest) returns (PlatformIdentityResponse);
  rpc FindByPlatformUserId (FindByPlatformUserIdRequest) returns (PlatformIdentityResponse);
  rpc ResolvePhoneByPlatformUserId (ResolvePhoneRequest) returns (ResolvePhoneResponse);
  rpc ListByUser (ListByUserRequest) returns (ListPlatformIdentitiesResponse);
  rpc UpdateLastSeen (UpdateLastSeenRequest) returns (MutationResponse);
  rpc TransferIdentity (TransferIdentityRequest) returns (PlatformIdentityResponse);
}

message MutationResponse {
  bool status = 1;
  string message = 2;
}

message PlatformIdentityEntry {
  string id = 1;
  string tenant_id = 2;
  string user_id = 3;
  // 'signal' | 'whatsapp' | 'messenger'
  string platform = 4;
  string platform_user_id = 5;
  string phone_e164 = 6;       // empty when not known
  string display_name = 7;     // empty when not known
  string verified_at = 8;      // ISO 8601
  string last_seen_at = 9;     // ISO 8601, empty when never seen
  string created_at = 10;
  string updated_at = 11;
}

message PlatformIdentityResponse {
  bool status = 1;
  string message = 2;
  PlatformIdentityEntry data = 3;
}

message UpsertPlatformIdentityRequest {
  string tenant_id = 1;
  string user_id = 2;
  string platform = 3;
  string platform_user_id = 4;
  string phone_e164 = 5;       // empty when not known
  string display_name = 6;     // empty when not known
  string verified_at = 7;      // ISO 8601
}

message FindByPlatformUserIdRequest {
  string tenant_id = 1;
  string platform = 2;
  string platform_user_id = 3;
}

// Lightweight lookup used on every incoming Signal message — returns
// just enough to translate UUID → phone for the existing identity flow.
message ResolvePhoneRequest {
  string tenant_id = 1;
  string platform = 2;
  string platform_user_id = 3;
}

message ResolvePhoneResponse {
  bool found = 1;
  string phone_e164 = 2;       // empty when found=false
  string user_id = 3;          // empty when found=false
}

message ListByUserRequest {
  string user_id = 1;
}

message ListPlatformIdentitiesResponse {
  bool status = 1;
  string message = 2;
  repeated PlatformIdentityEntry data = 3;
}

message UpdateLastSeenRequest {
  string id = 1;
  string seen_at = 2;          // ISO 8601
}

// Move an identity row from one user to another. Used when the same Signal
// UUID is re-bound to a different User in the same tenant (user changed
// their phone but kept their Signal account).
message TransferIdentityRequest {
  string id = 1;
  string new_user_id = 2;
  string new_phone_e164 = 3;   // empty to keep existing
}

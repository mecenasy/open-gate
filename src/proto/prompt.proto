syntax = "proto3";

package prompt;

service PromptProxyService {
  rpc AddPrompt (AddPromptRequest) returns (PromptResponse);
  rpc GetPromptById (GetPromptByIdRequest) returns (PromptResponse);
  rpc GetPromptByKey (GetPromptByKeyRequest) returns (PromptResponse);
  rpc UpdatePrompt (UpdatePromptRequest) returns (PromptResponse);
  rpc RemovePrompt (RemovePromptRequest) returns (PromptResponse);
  rpc GetAllPrompts (GetAllPromptsRequest) returns (GetAllPromptsResponse);
}

enum UserType {
  OWNER = 0;
  ADMIN = 1;
  SUPER_USER = 2;
  MEMBER = 3;
  USER = 4;
}

message AddPromptRequest {
  UserType userType = 1;
  string prompt = 2;
  string key = 3;
  string description = 4;
  string commandName = 5;
}

message GetPromptByIdRequest {
  string id = 1;
}

message GetPromptByKeyRequest {
  string key = 1;
}

message UpdatePromptRequest {
  string id = 1;
  optional string key = 2;
  optional string description = 3;
  optional string commandName = 4;
  optional UserType userType = 5;
  optional string prompt = 6;
}

message RemovePromptRequest {
  string id = 1;
}

message GetAllPromptsRequest {
  int32 page = 1;
  int32 limit = 2;
  optional UserType userType = 3;
}

message PromptResponse {
  bool status = 1;
  string message = 2;
  optional Prompt data = 3;
}

message GetAllPromptsResponse {
  bool status = 1;
  string message = 2;
  repeated PromptSimply data = 3;
  int32 total = 4;
}

message PromptSimply {
  string id = 1;
  string key = 2;
  string description = 3;
  string commandName = 4;
  UserType userType = 5;
}

message Prompt {
  string id = 1;
  string key = 2;
  string description = 3;
  string commandName = 4;
  UserType userType = 5;
  string prompt = 6;
}
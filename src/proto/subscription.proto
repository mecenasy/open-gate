syntax = "proto3";

package subscription;

service SubscriptionService {
  rpc GetAllPlans (GetAllPlansRequest) returns (GetAllPlansResponse);
  rpc GetPlanById (GetPlanByIdRequest) returns (GetPlanByIdResponse);
  rpc GetUserSubscription (GetUserSubscriptionRequest) returns (GetUserSubscriptionResponse);
  rpc SelectSubscription (SelectSubscriptionRequest) returns (SelectSubscriptionResponse);
  rpc CancelSubscription (CancelSubscriptionRequest) returns (CancelSubscriptionResponse);
  rpc GetSubscriptionHistory (GetSubscriptionHistoryRequest) returns (GetSubscriptionHistoryResponse);
}

message PlanEntry {
  string id = 1;
  string code = 2;
  string name = 3;
  int32 max_tenants = 4;
  int32 max_platforms_per_tenant = 5;
  int32 max_contacts_per_tenant = 6;
  int32 max_staff_per_tenant = 7;
  int32 max_custom_commands_per_tenant = 8;
  int32 price_cents = 9;
  string currency = 10;
  bool is_active = 11;
  // Phone procurement limits — 0 across the board for legacy plans where the
  // managed flow isn't available.
  int32 phone_numbers_included = 12;
  int32 messages_per_month_included = 13;
  // Cents charged per SMS sent over the included quota (operator pass-through + our markup).
  int32 price_per_extra_message_cents = 14;
  // Informational — what the number costs us per month from the operator.
  int32 phone_monthly_cost_cents = 15;
}

message GetAllPlansRequest {}

message GetAllPlansResponse {
  bool status = 1;
  string message = 2;
  repeated PlanEntry plans = 3;
}

message GetPlanByIdRequest {
  string plan_id = 1;
}

message GetPlanByIdResponse {
  bool status = 1;
  string message = 2;
  PlanEntry plan = 3;
}

message UserSubscriptionEntry {
  string id = 1;
  string user_id = 2;
  string plan_id = 3;
  string status = 4;
  string started_at = 5;
  string expires_at = 6;
  PlanEntry plan = 7;
}

message GetUserSubscriptionRequest {
  string user_id = 1;
}

message GetUserSubscriptionResponse {
  bool status = 1;
  string message = 2;
  UserSubscriptionEntry subscription = 3;
}

message SelectSubscriptionRequest {
  string user_id = 1;
  string plan_id = 2;
  string kind = 3; // 'initial' | 'upgrade' | 'downgrade' | 'same' — set by BFF after comparing plans
  string correlation_id = 4;
}

message SelectSubscriptionResponse {
  bool status = 1;
  string message = 2;
  UserSubscriptionEntry subscription = 3;
}

message CancelSubscriptionRequest {
  string user_id = 1;
  string correlation_id = 2;
}

message CancelSubscriptionResponse {
  bool status = 1;
  string message = 2;
}

message SubscriptionChangeEntry {
  string id = 1;
  string user_id = 2;
  string old_plan_id = 3;
  string new_plan_id = 4;
  string kind = 5;
  string initiated_at = 6;
}

message GetSubscriptionHistoryRequest {
  string user_id = 1;
  int32 limit = 2;
}

message GetSubscriptionHistoryResponse {
  bool status = 1;
  string message = 2;
  repeated SubscriptionChangeEntry changes = 3;
}

syntax = "proto3";

package tenant;

service TenantService {
  rpc GetCustomization (GetCustomizationRequest) returns (GetCustomizationResponse);
  rpc GetTenant (GetTenantRequest) returns (GetTenantResponse);
  rpc GetPlatformCredentials (GetPlatformCredentialsRequest) returns (GetPlatformCredentialsResponse);
  rpc GetTenantsWithPlatform (GetTenantsWithPlatformRequest) returns (GetTenantsWithPlatformResponse);
  rpc GetAllPlatformCredentials (GetAllPlatformCredentialsRequest) returns (GetAllPlatformCredentialsResponse);
  rpc CreateTenant (CreateTenantRequest) returns (CreateTenantResponse);
  rpc CheckTenantSlug (CheckTenantSlugRequest) returns (CheckTenantSlugResponse);
  rpc GetAllTenants (GetAllTenantsRequest) returns (GetAllTenantsResponse);
  rpc GetMyTenants (GetMyTenantsRequest) returns (GetMyTenantsResponse);
  rpc GetTenantsIStaffAt (GetTenantsIStaffAtRequest) returns (GetTenantsIStaffAtResponse);
  rpc UpdateCustomization (UpdateCustomizationRequest) returns (UpdateCustomizationResponse);
  rpc UpsertPlatformCredentials (UpsertPlatformCredentialsRequest) returns (UpsertPlatformCredentialsResponse);
  rpc GetTenantCommandConfigs (GetTenantCommandConfigsRequest) returns (GetTenantCommandConfigsResponse);
  rpc UpsertTenantCommandConfig (UpsertTenantCommandConfigRequest) returns (UpsertTenantCommandConfigResponse);
  rpc DeleteTenantCommandConfig (DeleteTenantCommandConfigRequest) returns (DeleteTenantCommandConfigResponse);
  rpc GetPromptForContext (GetPromptForContextRequest) returns (GetPromptForContextResponse);
  rpc UpsertTenantPromptOverride (UpsertTenantPromptOverrideRequest) returns (UpsertTenantPromptOverrideResponse);
  rpc GetTenantPromptOverrides (GetTenantPromptOverridesRequest) returns (GetTenantPromptOverridesResponse);
  rpc AddTenantStaff (AddTenantStaffRequest) returns (TenantStaffMutationResponse);
  rpc RemoveTenantStaff (RemoveTenantStaffRequest) returns (TenantStaffMutationResponse);
  rpc ChangeTenantStaffRole (ChangeTenantStaffRoleRequest) returns (TenantStaffMutationResponse);
  rpc GetTenantStaff (GetTenantStaffRequest) returns (GetTenantStaffResponse);
  rpc GetTenantStaffMembership (GetTenantStaffMembershipRequest) returns (GetTenantStaffMembershipResponse);
  rpc AddContact (AddContactRequest) returns (ContactEntryResponse);
  rpc UpdateContact (UpdateContactRequest) returns (ContactEntryResponse);
  rpc GetTenantContacts (GetTenantContactsRequest) returns (GetTenantContactsResponse);
  rpc RemoveContactFromTenant (RemoveContactFromTenantRequest) returns (MutationResponse);
  rpc GetTenantUsage (GetTenantUsageRequest) returns (GetTenantUsageResponse);
  rpc TransferTenantBilling (TransferTenantBillingRequest) returns (MutationResponse);
  rpc SetTenantActive (SetTenantActiveRequest) returns (MutationResponse);
  rpc DeleteTenant (DeleteTenantRequest) returns (MutationResponse);
}

message GetCustomizationRequest {
  string tenant_id = 1;
}

message GetCustomizationResponse {
  bool status = 1;
  string message = 2;
  string customization_json = 3;
}

message GetTenantRequest {
  string tenant_id = 1;
}

message GetTenantResponse {
  bool status = 1;
  string message = 2;
  string id = 3;
  string slug = 4;
  string schema_name = 5;
  bool is_active = 6;
  string billing_user_id = 7;
}

message GetPlatformCredentialsRequest {
  string tenant_id = 1;
  string platform = 2;
}

message GetPlatformCredentialsResponse {
  bool status = 1;
  string message = 2;
  string config_json = 3;
  bool is_default = 4;
}

message PlatformCredentialItem {
  string platform = 1;
  string config_json = 2;
  bool is_default = 3;
}

message GetAllPlatformCredentialsRequest {
  string tenant_id = 1;
}

message GetAllPlatformCredentialsResponse {
  bool status = 1;
  string message = 2;
  repeated PlatformCredentialItem items = 3;
}

message TenantPlatformEntry {
  string tenant_id = 1;
  string config_json = 2;
}

message GetTenantsWithPlatformRequest {
  string platform = 1;
}

message GetTenantsWithPlatformResponse {
  bool status = 1;
  string message = 2;
  repeated TenantPlatformEntry entries = 3;
}

message CreateTenantRequest {
  string slug = 1;
  string billing_user_id = 2;
}

message CreateTenantResponse {
  bool status = 1;
  string message = 2;
  string id = 3;
  string slug = 4;
  string schema_name = 5;
}

message CheckTenantSlugRequest {
  string slug = 1;
}

message CheckTenantSlugResponse {
  bool status = 1;
  string message = 2;
  bool is_available = 3;
}

message TenantEntry {
  string id = 1;
  string slug = 2;
  string schema_name = 3;
  bool is_active = 4;
  string billing_user_id = 5;
}

message GetAllTenantsRequest {}

message GetAllTenantsResponse {
  bool status = 1;
  string message = 2;
  repeated TenantEntry tenants = 3;
}

message GetMyTenantsRequest {
  string user_id = 1;
}

message GetMyTenantsResponse {
  bool status = 1;
  string message = 2;
  repeated TenantEntry tenants = 3;
}

message TenantStaffEntry {
  string tenant_id = 1;
  string user_id = 2;
  string role = 3;
  string tenant_slug = 4;
}

message GetTenantsIStaffAtRequest {
  string user_id = 1;
}

message GetTenantsIStaffAtResponse {
  bool status = 1;
  string message = 2;
  repeated TenantStaffEntry memberships = 3;
}

message MutationResponse {
  bool status = 1;
  string message = 2;
}

message TenantStaffMutationResponse {
  bool status = 1;
  string message = 2;
  TenantStaffEntry entry = 3;
}

message AddTenantStaffRequest {
  string tenant_id = 1;
  string user_id = 2;
  string role = 3;
}

message RemoveTenantStaffRequest {
  string tenant_id = 1;
  string user_id = 2;
}

message ChangeTenantStaffRoleRequest {
  string tenant_id = 1;
  string user_id = 2;
  string role = 3;
}

message GetTenantStaffRequest {
  string tenant_id = 1;
}

message GetTenantStaffResponse {
  bool status = 1;
  string message = 2;
  repeated TenantStaffEntry members = 3;
}

message GetTenantStaffMembershipRequest {
  string tenant_id = 1;
  string user_id = 2;
}

message GetTenantStaffMembershipResponse {
  bool status = 1;
  string message = 2;
  bool is_member = 3;
  string role = 4;
}

message ContactEntry {
  string id = 1;
  string email = 2;
  string phone = 3;
  string name = 4;
  string surname = 5;
  string access_level = 6;
}

message ContactEntryResponse {
  bool status = 1;
  string message = 2;
  ContactEntry contact = 3;
}

message AddContactRequest {
  string tenant_id = 1;
  string email = 2;
  string phone = 3;
  string name = 4;
  string surname = 5;
  string access_level = 6;
}

message UpdateContactRequest {
  string contact_id = 1;
  string email = 2;
  string phone = 3;
  string name = 4;
  string surname = 5;
}

message GetTenantContactsRequest {
  string tenant_id = 1;
}

message GetTenantContactsResponse {
  bool status = 1;
  string message = 2;
  repeated ContactEntry contacts = 3;
}

message RemoveContactFromTenantRequest {
  string tenant_id = 1;
  string contact_id = 2;
}

message UpdateCustomizationRequest {
  string tenant_id = 1;
  string customization_json = 2;
}

message UpdateCustomizationResponse {
  bool status = 1;
  string message = 2;
}

message UpsertPlatformCredentialsRequest {
  string tenant_id = 1;
  string platform = 2;
  string config_json = 3;
}

message UpsertPlatformCredentialsResponse {
  bool status = 1;
  string message = 2;
}

message TenantCommandConfigEntry {
  string id = 1;
  string command_name = 2;
  bool active = 3;
  string parameters_override_json = 4;
  repeated string user_types = 5;
  string actions_json = 6;
  string description_i18n_json = 7;
}

message GetTenantCommandConfigsRequest {
  string tenant_id = 1;
}

message GetTenantCommandConfigsResponse {
  bool status = 1;
  string message = 2;
  repeated TenantCommandConfigEntry configs = 3;
}

message UpsertTenantCommandConfigRequest {
  string tenant_id = 1;
  string command_name = 2;
  bool active = 3;
  string parameters_override_json = 4;
  repeated string user_types = 5;
  string actions_json = 6;
  string description_i18n_json = 7;
}

message UpsertTenantCommandConfigResponse {
  bool status = 1;
  string message = 2;
}

message DeleteTenantCommandConfigRequest {
  string tenant_id = 1;
  string command_name = 2;
}

message DeleteTenantCommandConfigResponse {
  bool status = 1;
  string message = 2;
}

message GetPromptForContextRequest {
  string tenant_id = 1;
  string command_id = 2;
  string user_type = 3;
}

message GetPromptForContextResponse {
  bool status = 1;
  string message = 2;
  string prompt = 3;
}

message TenantPromptOverrideEntry {
  string id = 1;
  string tenant_id = 2;
  string command_id = 3;
  string user_type = 4;
  string description_i18n_json = 5;
  string prompt = 6;
}

message UpsertTenantPromptOverrideRequest {
  string tenant_id = 1;
  string command_id = 2;
  string user_type = 3;
  string description_i18n_json = 4;
  string prompt = 5;
}

message UpsertTenantPromptOverrideResponse {
  bool status = 1;
  string message = 2;
}

message GetTenantPromptOverridesRequest {
  string tenant_id = 1;
}

message GetTenantPromptOverridesResponse {
  bool status = 1;
  string message = 2;
  repeated TenantPromptOverrideEntry overrides = 3;
}

message TenantUsageEntry {
  string tenant_id = 1;
  int32 staff = 2;
  int32 platforms = 3;
  int32 contacts = 4;
  int32 custom_commands = 5;
}

message GetTenantUsageRequest {
  string billing_user_id = 1;
}

message GetTenantUsageResponse {
  bool status = 1;
  string message = 2;
  int32 tenants = 3;
  repeated TenantUsageEntry per_tenant = 4;
}

message TransferTenantBillingRequest {
  string tenant_id = 1;
  string new_billing_user_id = 2;
}

message SetTenantActiveRequest {
  string tenant_id = 1;
  bool active = 2;
}

message DeleteTenantRequest {
  string tenant_id = 1;
  string slug_confirmation = 2;
}

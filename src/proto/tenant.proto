syntax = "proto3";

package tenant;

service TenantService {
  rpc GetCustomization (GetCustomizationRequest) returns (GetCustomizationResponse);
  rpc GetTenant (GetTenantRequest) returns (GetTenantResponse);
  rpc GetPlatformCredentials (GetPlatformCredentialsRequest) returns (GetPlatformCredentialsResponse);
  rpc GetTenantsWithPlatform (GetTenantsWithPlatformRequest) returns (GetTenantsWithPlatformResponse);
  rpc CreateTenant (CreateTenantRequest) returns (CreateTenantResponse);
  rpc GetAllTenants (GetAllTenantsRequest) returns (GetAllTenantsResponse);
  rpc UpdateCustomization (UpdateCustomizationRequest) returns (UpdateCustomizationResponse);
  rpc UpsertPlatformCredentials (UpsertPlatformCredentialsRequest) returns (UpsertPlatformCredentialsResponse);
}

message GetCustomizationRequest {
  string tenant_id = 1;
}

message GetCustomizationResponse {
  bool status = 1;
  string message = 2;
  string customization_json = 3;
}

message GetTenantRequest {
  string tenant_id = 1;
}

message GetTenantResponse {
  bool status = 1;
  string message = 2;
  string id = 3;
  string slug = 4;
  string schema_name = 5;
  bool is_active = 6;
}

message GetPlatformCredentialsRequest {
  string tenant_id = 1;
  string platform = 2;
}

message GetPlatformCredentialsResponse {
  bool status = 1;
  string message = 2;
  string config_json = 3;
}

message TenantPlatformEntry {
  string tenant_id = 1;
  string config_json = 2;
}

message GetTenantsWithPlatformRequest {
  string platform = 1;
}

message GetTenantsWithPlatformResponse {
  bool status = 1;
  string message = 2;
  repeated TenantPlatformEntry entries = 3;
}

message CreateTenantRequest {
  string slug = 1;
}

message CreateTenantResponse {
  bool status = 1;
  string message = 2;
  string id = 3;
  string slug = 4;
  string schema_name = 5;
}

message TenantEntry {
  string id = 1;
  string slug = 2;
  string schema_name = 3;
  bool is_active = 4;
}

message GetAllTenantsRequest {}

message GetAllTenantsResponse {
  bool status = 1;
  string message = 2;
  repeated TenantEntry tenants = 3;
}

message UpdateCustomizationRequest {
  string tenant_id = 1;
  string customization_json = 2;
}

message UpdateCustomizationResponse {
  bool status = 1;
  string message = 2;
}

message UpsertPlatformCredentialsRequest {
  string tenant_id = 1;
  string platform = 2;
  string config_json = 3;
}

message UpsertPlatformCredentialsResponse {
  bool status = 1;
  string message = 2;
}

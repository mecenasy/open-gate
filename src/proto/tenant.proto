syntax = "proto3";

package tenant;

service TenantService {
  rpc GetCustomization (GetCustomizationRequest) returns (GetCustomizationResponse);
  rpc GetTenant (GetTenantRequest) returns (GetTenantResponse);
  rpc GetPlatformCredentials (GetPlatformCredentialsRequest) returns (GetPlatformCredentialsResponse);
  rpc GetTenantsWithPlatform (GetTenantsWithPlatformRequest) returns (GetTenantsWithPlatformResponse);
  rpc GetAllPlatformCredentials (GetAllPlatformCredentialsRequest) returns (GetAllPlatformCredentialsResponse);
  rpc CreateTenant (CreateTenantRequest) returns (CreateTenantResponse);
  rpc GetAllTenants (GetAllTenantsRequest) returns (GetAllTenantsResponse);
  rpc UpdateCustomization (UpdateCustomizationRequest) returns (UpdateCustomizationResponse);
  rpc UpsertPlatformCredentials (UpsertPlatformCredentialsRequest) returns (UpsertPlatformCredentialsResponse);
  rpc GetTenantCommandConfigs (GetTenantCommandConfigsRequest) returns (GetTenantCommandConfigsResponse);
  rpc UpsertTenantCommandConfig (UpsertTenantCommandConfigRequest) returns (UpsertTenantCommandConfigResponse);
  rpc GetPromptForContext (GetPromptForContextRequest) returns (GetPromptForContextResponse);
  rpc UpsertTenantPromptOverride (UpsertTenantPromptOverrideRequest) returns (UpsertTenantPromptOverrideResponse);
  rpc GetTenantPromptOverrides (GetTenantPromptOverridesRequest) returns (GetTenantPromptOverridesResponse);
}

message GetCustomizationRequest {
  string tenant_id = 1;
}

message GetCustomizationResponse {
  bool status = 1;
  string message = 2;
  string customization_json = 3;
}

message GetTenantRequest {
  string tenant_id = 1;
}

message GetTenantResponse {
  bool status = 1;
  string message = 2;
  string id = 3;
  string slug = 4;
  string schema_name = 5;
  bool is_active = 6;
}

message GetPlatformCredentialsRequest {
  string tenant_id = 1;
  string platform = 2;
}

message GetPlatformCredentialsResponse {
  bool status = 1;
  string message = 2;
  string config_json = 3;
  bool is_default = 4;
}

message PlatformCredentialItem {
  string platform = 1;
  string config_json = 2;
  bool is_default = 3;
}

message GetAllPlatformCredentialsRequest {
  string tenant_id = 1;
}

message GetAllPlatformCredentialsResponse {
  bool status = 1;
  string message = 2;
  repeated PlatformCredentialItem items = 3;
}

message TenantPlatformEntry {
  string tenant_id = 1;
  string config_json = 2;
}

message GetTenantsWithPlatformRequest {
  string platform = 1;
}

message GetTenantsWithPlatformResponse {
  bool status = 1;
  string message = 2;
  repeated TenantPlatformEntry entries = 3;
}

message CreateTenantRequest {
  string slug = 1;
}

message CreateTenantResponse {
  bool status = 1;
  string message = 2;
  string id = 3;
  string slug = 4;
  string schema_name = 5;
}

message TenantEntry {
  string id = 1;
  string slug = 2;
  string schema_name = 3;
  bool is_active = 4;
}

message GetAllTenantsRequest {}

message GetAllTenantsResponse {
  bool status = 1;
  string message = 2;
  repeated TenantEntry tenants = 3;
}

message UpdateCustomizationRequest {
  string tenant_id = 1;
  string customization_json = 2;
}

message UpdateCustomizationResponse {
  bool status = 1;
  string message = 2;
}

message UpsertPlatformCredentialsRequest {
  string tenant_id = 1;
  string platform = 2;
  string config_json = 3;
}

message UpsertPlatformCredentialsResponse {
  bool status = 1;
  string message = 2;
}

message TenantCommandConfigEntry {
  string id = 1;
  string command_id = 2;
  string command_name = 3;
  bool active = 4;
  string parameters_override_json = 5;
}

message GetTenantCommandConfigsRequest {
  string tenant_id = 1;
}

message GetTenantCommandConfigsResponse {
  bool status = 1;
  string message = 2;
  repeated TenantCommandConfigEntry configs = 3;
}

message UpsertTenantCommandConfigRequest {
  string tenant_id = 1;
  string command_id = 2;
  bool active = 3;
  string parameters_override_json = 4;
}

message UpsertTenantCommandConfigResponse {
  bool status = 1;
  string message = 2;
}

message GetPromptForContextRequest {
  string tenant_id = 1;
  string command_id = 2;
  string user_type = 3;
}

message GetPromptForContextResponse {
  bool status = 1;
  string message = 2;
  string prompt = 3;
}

message TenantPromptOverrideEntry {
  string id = 1;
  string tenant_id = 2;
  string command_id = 3;
  string user_type = 4;
  string description = 5;
  string prompt = 6;
}

message UpsertTenantPromptOverrideRequest {
  string tenant_id = 1;
  string command_id = 2;
  string user_type = 3;
  string description = 4;
  string prompt = 5;
}

message UpsertTenantPromptOverrideResponse {
  bool status = 1;
  string message = 2;
}

message GetTenantPromptOverridesRequest {
  string tenant_id = 1;
}

message GetTenantPromptOverridesResponse {
  bool status = 1;
  string message = 2;
  repeated TenantPromptOverrideEntry overrides = 3;
}

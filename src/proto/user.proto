syntax = "proto3";

package user;

service UserProxyService {
  rpc AddUser (AddUserRequest) returns (UserResponse);
  rpc GetUser (GetUserRequest) returns (UserResponse);
  rpc GetUserByEmail (GetUserByEmailRequest) returns (UserResponse);
  rpc GetUserByPhone (GetUserByPhoneRequest) returns (UserResponse);
  rpc UpdateUser (UpdateUserRequest) returns (UserResponse);
  rpc UpdateUserStatus (UpdateUserStatusRequest) returns (UserResponse);
  rpc UpdateUserRole (UpdateUserRoleRequest) returns (UserResponse);
  rpc RemoveUser (RemoveUserRequest) returns (UserResponse);
  rpc GetAllUsers (GetAllUsersRequest) returns (GetAllUsersResponse);
  rpc CheckExist(CheckExistRequest) returns (CheckExistResponse);
}

enum Status {
  PENDING = 0;
  ACTIVE = 1;
  SUSPENDED = 2;
  BANNED = 3;
}

enum UserType {
  OWNER = 0;
  ADMIN = 1;
  SUPER_USER = 2;
  MEMBER = 3;
  USER = 4;
}

message CheckExistRequest {
  string email = 1;
}
message CheckExistResponse {
  bool exist = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message AddUserRequest {
  string email = 1;
  string phone = 2;
  string name = 3;
  string surname = 4;
  optional Status status = 5;
  optional string phoneOwner = 6;
  optional UserType type = 7;
  optional string password = 8;
}

message GetUserRequest {
  string id = 1;
}

message GetUserByPhoneRequest {
  string phone = 1;
}

message UpdateUserRequest {
  string id = 1;
  optional string email = 2;
  optional string phone = 3;
  optional string name = 4;
  optional string surname = 5;
  optional Status status = 6;
  optional UserType type = 7;
}

message UpdateUserStatusRequest {
  string id = 1;
  Status status = 2;
}

message UpdateUserRoleRequest {
  string id = 1;
  UserType type = 2;
}

message RemoveUserRequest {
  string id = 1;
}

message GetAllUsersRequest {
  int32 page = 1;
  int32 limit = 2;
}

message UserResponse {
  bool status = 1;
  string message = 2;
  optional UserData data = 3;
}

message GetAllUsersResponse {
  bool status = 1;
  string message = 2;
  repeated UserData data = 3;
  int32 total = 4;
}

message UserData {
  string id = 1;
  string email = 2;
  string phone = 3;
  string name = 4;
  string surname = 5;
  Status status = 6;
  UserType type = 7;
}
